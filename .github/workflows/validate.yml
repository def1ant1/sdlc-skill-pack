name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]
  release:
    types: [published, prereleased]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check scripts/ tests/

      - name: Validate skill structure
        run: python scripts/validation/validate_skill_structure.py .

      - name: Validate frontmatter
        run: python scripts/validation/validate_frontmatter.py .

      - name: Detect skill gaps
        run: |
          python scripts/orchestration/detect_skill_gaps.py . | \
            python -c "
          import json, sys
          d = json.load(sys.stdin)
          gaps = d.get('missing_dependencies', [])
          if gaps:
              print(f'Unresolved dependencies: {gaps}')
              sys.exit(1)
          print(f'No dependency gaps found ({len(d[\"registered_skills\"])} skills registered)')
          "

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run V9 contract/eval/telemetry/context checks
        run: |
          python scripts/validate_backlog_truth.py
          python scripts/validate_skill_contracts.py
          python scripts/check_context_budget.py
          python scripts/generate_skill_inventory.py
          python scripts/generate_dependency_graph.py
          python scripts/detect_skill_overlap.py
          python scripts/validate_skill_evals.py
          python scripts/validate_telemetry_events.py

      - name: Validate release readiness (P0/P1 gates)
        run: python scripts/run_premerge_checks.py

      - name: Generate reports
        run: python scripts/generate_release_reports.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/

  release-reports:
    name: Release/RC reports
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate release reports
        run: python scripts/generate_release_reports.py

      - name: Upload release candidate reports
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-reports-${{ github.event.release.tag_name }}
          path: |
            reports/repo_truth_report.*
            reports/skill_inventory.*
            reports/skill_dependency_graph.*
            reports/orchestration_map.md
            reports/routing_collision_report.md

  security-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for secrets
        run: |
          python scripts/security/scan_for_secrets.py --path . --exit-on-finding