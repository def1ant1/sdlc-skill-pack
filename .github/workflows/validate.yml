name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]
  release:
    types: [published, prereleased]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check scripts/ tests/

      - name: Validate skill structure
        run: python scripts/validation/validate_skill_structure.py .

      - name: Validate frontmatter
        run: python scripts/validation/validate_frontmatter.py .

      - name: Validate workflow plans
        run: python scripts/validation/validate_workflow_plan.py tests/fixtures/workflow-plans/valid-plan.yaml

      - name: Validate canonical entities
        run: python scripts/validation/validate_canonical_entities.py

      - name: Validate event payload schemas
        run: python scripts/validation/validate_event_schemas.py

      - name: Validate connector mappings and workflow outputs
        run: python scripts/validation/validate_connector_mappings.py

      - name: Detect skill gaps
        run: |
          python scripts/orchestration/detect_skill_gaps.py . | \
            python -c "
          import json, sys
          d = json.load(sys.stdin)
          gaps = d.get('missing_dependencies', [])
          if gaps:
              print(f'Unresolved dependencies: {gaps}')
              sys.exit(1)
          print(f'No dependency gaps found ({len(d[\"registered_skills\"])} skills registered)')
          "

      - name: Run local orchestration regression gates
        run: |
          pytest --tb=short -q             tests/runtime/test_execute_workflow.py             tests/scheduling/test_scheduling.py

      - name: Run tests
        run: pytest --tb=short -q

      - name: Build release package
        run: python scripts/package_release.py --version 0.0.0-ci

      - name: Validate release package contents
        run: python scripts/validate_release_package.py --zip-path dist/apotheon-skill-pack-v0.0.0-ci.zip

      - name: Validate documentation uniqueness
        run: python scripts/docs/validate_doc_uniqueness.py

      - name: Check backlog/changelog sync
        run: python scripts/docs/check_backlog_changelog_sync.py

      - name: Enforce documentation freshness
        run: python scripts/docs/enforce_doc_freshness.py

      - name: Run pre-merge contracts phase gates
        run: python scripts/run_premerge_checks.py --phase contracts

      - name: Run release phase gates
        run: python scripts/run_premerge_checks.py --phase release

      - name: Validate release artifacts
        run: python scripts/validate_release_artifacts.py

      - name: Generate reports
        run: |
          python scripts/generate_release_reports.py
          python scripts/validate_hitl_coverage.py
          python scripts/grade_skill_maturity.py

      - name: Enforce regenerated reports are committed
        run: |
          git status --short -- reports/
          test -z "$(git status --short -- reports/)" || {
            echo "Generated reports changed. Commit updated files in reports/."
            git diff -- reports/
            exit 1
          }

      - name: Enforce phase checklist gating on pull requests
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          body = os.environ.get("PR_BODY") or ""
          phase_pattern = re.compile(r"- \[[xX]\] .*phase", re.IGNORECASE)
          gate_pattern = re.compile(r"- \[[xX]\] (?:All relevant validation gates passed|Generated reports were regenerated and committed)", re.IGNORECASE)

          phase_checked = bool(phase_pattern.search(body))
          gating_checks = len(gate_pattern.findall(body))

          if phase_checked and gating_checks < 2:
            print(
              "Phase completion boxes cannot be checked until both gating boxes are checked: "
              "'All relevant validation gates passed' and 'Generated reports were regenerated and committed'."
            )
            sys.exit(1)

          print("Phase checklist gating check passed.")
          PY

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/

  release-reports:
    name: Release/RC reports
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate release reports
        run: |
          python scripts/generate_release_reports.py
          python scripts/validate_hitl_coverage.py
          python scripts/grade_skill_maturity.py

      - name: Enforce release report drift check
        run: |
          git status --short -- reports/
          test -z "$(git status --short -- reports/)" || {
            echo "Release report drift detected in reports/."
            git diff -- reports/
            exit 1
          }

      - name: Upload release candidate reports
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-reports-${{ github.event.release.tag_name }}
          path: |
            reports/repo_truth_report.*
            reports/skill_inventory.*
            reports/skill_dependency_graph.*
            reports/orchestration_map.md
            reports/routing_collision_report.md

  security-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for secrets
        run: |
          python scripts/security/scan_for_secrets.py --path . --exit-on-finding
