name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check scripts/ tests/

      - name: Validate skill structure
        run: python scripts/validation/validate_skill_structure.py .

      - name: Validate frontmatter
        run: python scripts/validation/validate_frontmatter.py .

      - name: Detect skill gaps
        run: |
          python scripts/orchestration/detect_skill_gaps.py . | \
            python -c "
          import json, sys
          d = json.load(sys.stdin)
          gaps = d.get('missing_dependencies', [])
          if gaps:
              print(f'Unresolved dependencies: {gaps}')
              sys.exit(1)
          print(f'No dependency gaps found ({len(d[\"registered_skills\"])} skills registered)')
          "

      - name: Run tests
        run: pytest --tb=short -q

  security-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for secrets
        run: |
          python scripts/security/scan_for_secrets.py --path . --exit-on-finding