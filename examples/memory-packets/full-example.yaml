  updated_at: "2026-05-06T15:45:00Z"
  workflow_plan_id: WP-20260506-001

  project:
    name: DocFlow AI API
    domain: AI-native document processing
    objective: Build a production-grade REST API that accepts documents, extracts structured data using an LLM, and returns results with observability and security controls.
    complexity: full-sdlc

  phase_status:
    architecture: complete
    ai-engineering: complete
    backend: in_progress
    security: pending
    qa: pending
    release: pending
    observability: pending

  current_phase: backend

  decisions:
    accepted:
      - id: DEC-001
        phase: architecture
        decision: Use FastAPI on Python 3.12 for the REST API layer.
        rationale: Team has existing FastAPI expertise; async support matches document processing throughput requirements.
        adr_ref: docs/adrs/ADR-001-api-framework.md

      - id: DEC-002
        phase: architecture
        decision: Use PostgreSQL 16 with pgvector for document metadata and embedding storage.
        rationale: Consolidates relational and vector storage; avoids dual-database operational complexity.
        adr_ref: docs/adrs/ADR-002-database.md

      - id: DEC-003
        phase: architecture
        decision: Deploy as containerized service on AWS ECS Fargate with ALB.
        rationale: Matches existing infrastructure; serverless containers reduce ops burden for initial release.
        adr_ref: docs/adrs/ADR-003-deployment.md

      - id: DEC-004
        phase: ai-engineering
        decision: Use Claude claude-sonnet-4-6 via Anthropic API for document extraction.
        rationale: Best accuracy on structured extraction benchmarks; acceptable latency for async processing mode.
        adr_ref: docs/adrs/ADR-004-model-selection.md

      - id: DEC-005
        phase: ai-engineering
        decision: All document extraction runs asynchronously via a job queue; no synchronous LLM calls on the request path.
        rationale: Decouples API latency SLO from LLM inference latency; enables retry and observability.

    rejected:
      - id: REJ-001
        phase: architecture
        option: MongoDB as the primary datastore
        reason: Lack of native vector support requires additional tooling; team has stronger PostgreSQL expertise.

      - id: REJ-002
        phase: ai-engineering
        option: Synchronous LLM calls on the API request path
        reason: P99 latency of LLM inference (2–8s) would violate the 500ms API response SLO.

    pending:
      - id: PEN-001
        phase: backend
        question: Should the job queue use SQS or an in-process queue (Celery/Redis)?
        unblocks: backend-implementation-ready gate (GATE-004)
        owner: user

  constraints:
    business:
      - Must be production-ready for pilot within 6 weeks.
      - Initial pilot limited to internal documents only — no external user uploads.
    technical:
      - Must deploy on AWS; no GCP or Azure services.
      - API response SLO is 500ms at P95 for job submission; extraction results are async.
      - Python 3.12+ required to match existing team stack.
    security:
      - No document content may be logged at INFO level or below.
      - Anthropic API key must be stored in AWS Secrets Manager; never in environment variables or config files.
      - All inter-service communication must use TLS 1.3.
    compliance:
      - Documents may contain PII; data handling must comply with internal data governance policy.
    ai_specific:
      - Model outputs must include a confidence score or uncertainty indicator.
      - Extraction failures must be surfaced to the caller, not silently returned as empty results.

