$schema: "https://json-schema.org/draft/2020-12/schema"
title: Invoice
description: Schema for an invoice record processed by accounting-automation.
type: object
required: [id, vendor, invoice_number, amount, currency, invoice_date, due_date]
additionalProperties: false

properties:
  id:
    type: string
    pattern: "^INV-\\d{8}-\\d{3}$"
    description: Internal invoice identifier (INV-YYYYMMDD-NNN)
    example: "INV-20260506-001"

  vendor:
    type: string
    minLength: 1
    description: Vendor name as it appears on the invoice

  vendor_id:
    type: string
    description: Reference to vendor registry entry (VND-NNN)

  invoice_number:
    type: string
    description: Vendor-assigned invoice number

  amount:
    type: number
    minimum: 0
    description: Total invoice amount (pre-tax)

  tax_amount:
    type: number
    minimum: 0
    default: 0
    description: Tax amount

  total_amount:
    type: number
    minimum: 0
    description: Total invoice amount including tax

  currency:
    type: string
    pattern: "^[A-Z]{3}$"
    default: "USD"

  invoice_date:
    type: string
    format: date
    description: Date on the invoice (YYYY-MM-DD)

  due_date:
    type: string
    format: date
    description: Payment due date

  received_date:
    type: string
    format: date
    description: Date invoice was received

  line_items:
    type: array
    items:
      type: object
      required: [description, quantity, unit_price, total]
      properties:
        description:
          type: string
        quantity:
          type: number
          minimum: 0
        unit_price:
          type: number
          minimum: 0
        total:
          type: number
          minimum: 0
        gl_code:
          type: string
        cost_center:
          type: string

  status:
    type: string
    enum: [received, processing, pending-approval, approved, paid, rejected, disputed]
    default: received

  transaction_id:
    type: string
    pattern: "^TXN-\\d{8}-\\d{3}$"
    description: Reference to the transaction created when this invoice was posted

  purchase_order:
    type: string
    description: PO number this invoice is matched against

  extraction_confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: AI extraction confidence (flag for review if < 0.90)

  requires_review:
    type: boolean
    default: false
    description: Set to true if extraction confidence is low or anomalies detected

  anomaly_flags:
    type: array
    items:
      type: string
    default: []

  notes:
    type: string

  created_at:
    type: string
    format: date-time

  source_file:
    type: string
    description: Path to the source invoice PDF or file