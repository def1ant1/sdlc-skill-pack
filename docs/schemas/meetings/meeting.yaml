$schema: "https://json-schema.org/draft/2020-12/schema"
title: Meeting
description: Schema for a meeting record captured by the meeting-intelligence skill.
type: object
required: [id, title, date, meeting_type, participants]
additionalProperties: false

properties:
  id:
    type: string
    pattern: "^MTG-\\d{8}-\\d{3}$"
    description: Unique meeting identifier (MTG-YYYYMMDD-NNN)
    example: "MTG-20260506-001"

  title:
    type: string
    minLength: 1
    maxLength: 200
    description: Descriptive title of the meeting

  date:
    type: string
    format: date
    description: Date of the meeting (YYYY-MM-DD)

  start_time:
    type: string
    pattern: "^\\d{2}:\\d{2} UTC$"
    description: Start time in UTC (HH:MM UTC)
    example: "14:00 UTC"

  duration_minutes:
    type: integer
    minimum: 1
    maximum: 480
    description: Duration in minutes

  meeting_type:
    type: string
    enum: [standup, planning, review, decision, 1on1, all-hands, external, board, interview, other]
    description: Category of meeting

  participants:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, attendance]
      properties:
        name:
          type: string
        role:
          type: string
        attendance:
          type: string
          enum: [present, absent, partial]
        joined_at:
          type: string
          format: date-time
        left_at:
          type: string
          format: date-time

  decisions:
    type: array
    items:
      $ref: "#/$defs/decision"
    default: []

  action_items:
    type: array
    items:
      $ref: "./action-item.yaml"
    default: []

  open_questions:
    type: array
    items:
      type: object
      required: [question]
      properties:
        question:
          type: string
        owner:
          type: string
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [open, resolved, deferred]
    default: []

  related_projects:
    type: array
    items:
      type: string
    default: []

  related_tickets:
    type: array
    items:
      type: string
    default: []

  recording_url:
    type: string
    format: uri

  transcript_ref:
    type: string
    description: File path or URI to the transcript

  summary:
    type: string
    description: Human-reviewed summary of the meeting

  summary_approved_by:
    type: string
    description: Name of person who approved the summary

  summary_approved_at:
    type: string
    format: date-time

  created_at:
    type: string
    format: date-time

  created_by:
    type: string
    description: System or person that created this record

$defs:
  decision:
    type: object
    required: [text, decided_at]
    properties:
      text:
        type: string
        description: The decision that was made
      decided_by:
        type: string
        description: Name or role of decision maker
      rationale:
        type: string
      timestamp:
        type: string
        description: Time within the meeting when decision was made (HH:MM)
      knowledge_graph_id:
        type: string
        description: ID of the corresponding Decision node in the knowledge graph
      decided_at:
        type: string
        format: date-time