version: "3.9"

# Apotheon runtime infrastructure
# Usage: docker compose up -d
# Docs: docs/onboarding/DEPLOYMENT.md

services:

  # -------------------------------------------------------------------------
  # Vector memory store
  # Dashboard: http://localhost:6333/dashboard
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: apotheon-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Durable workflow engine
  # gRPC: localhost:7233
  # -------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: apotheon-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"   # gRPC (SDK connection)
      - "7234:7234"   # HTTP (membership)
      - "7235:7235"   # inter-node
    environment:
      - DB=sqlite
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_BROADCAST_ADDRESS=127.0.0.1
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - temporal_data:/etc/temporal/config/sqlite
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # Temporal Web UI
  # Dashboard: http://localhost:8080
  # -------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: apotheon-temporal-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      temporal:
        condition: service_started

  # -------------------------------------------------------------------------
  # Local embedding model server (optional — default EMBEDDING_BACKEND)
  # Pull model after start: docker exec apotheon-ollama ollama pull nomic-embed-text
  # Dashboard: http://localhost:11434
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: apotheon-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (uncomment if NVIDIA drivers installed):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  qdrant_data:
    driver: local
  temporal_data:
    driver: local
  ollama_data:
    driver: local

# -------------------------------------------------------------------------
# Profiles:
#   docker compose up -d                  # all services
#   docker compose up -d qdrant temporal  # without Ollama (use OpenAI embeddings)
#   docker compose up -d ollama           # embedding only
# -------------------------------------------------------------------------
