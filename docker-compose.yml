version: "3.9"

# Apotheon runtime infrastructure
# Usage: docker compose up -d
# Docs: docs/onboarding/DEPLOYMENT.md

services:

  # -------------------------------------------------------------------------
  # Vector memory store
  # Dashboard: http://localhost:6333/dashboard
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: apotheon-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Durable workflow engine
  # gRPC: localhost:7233
  # -------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: apotheon-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"   # gRPC (SDK connection)
      - "7234:7234"   # HTTP (membership)
      - "7235:7235"   # inter-node
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=apotheon
      - POSTGRES_PWD=apotheon
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_BROADCAST_ADDRESS=127.0.0.1
      - BIND_ON_IP=0.0.0.0
      - TEMPORAL_NAMESPACES=apotheon-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # Temporal Web UI
  # Dashboard: http://localhost:8080
  # -------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: apotheon-temporal-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      temporal:
        condition: service_started

  # -------------------------------------------------------------------------
  # Local embedding model server (optional — default EMBEDDING_BACKEND)
  # Pull model after start: docker exec apotheon-ollama ollama pull nomic-embed-text
  # Dashboard: http://localhost:11434
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: apotheon-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (uncomment if NVIDIA drivers installed):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # -------------------------------------------------------------------------
  # PostgreSQL — structured storage, audit log, workflow runs
  # Connection: postgresql://apotheon:apotheon@localhost:5432/apotheon
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: apotheon-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apotheon
      POSTGRES_USER: apotheon
      POSTGRES_PASSWORD: apotheon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apotheon -d apotheon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis — hot memory cache, rate limiting, pub/sub for WebSocket
  # Connection: redis://localhost:6379
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: apotheon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Apotheon API — FastAPI application server
  # API:       http://localhost:8000
  # Docs:      http://localhost:8000/docs
  # Metrics:   http://localhost:8000/metrics
  # -------------------------------------------------------------------------
  api:
    image: apotheon:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apotheon-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://apotheon:apotheon@postgres:5432/apotheon
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - full

volumes:
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# -------------------------------------------------------------------------
# Profiles:
#   docker compose up -d                        # infra only (qdrant, temporal, ollama, postgres, redis)
#   docker compose --profile full up -d         # infra + API server
#   docker compose up -d qdrant temporal        # without Ollama (use OpenAI embeddings)
#   docker compose up -d postgres redis         # DB + cache only
# -------------------------------------------------------------------------
