version: "3.9"

name: apotheon

x-health-defaults: &health_defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 10s

services:
  postgres:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: postgres:16.3-alpine
    container_name: apotheon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apotheon
      POSTGRES_USER: apotheon
      POSTGRES_PASSWORD: apotheon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apotheon -d apotheon"]
      <<: *health_defaults

  redis:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: redis:7.2.5-alpine
    container_name: apotheon-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *health_defaults

  qdrant:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: qdrant/qdrant:v1.9.5
    container_name: apotheon-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/collections"]
      <<: *health_defaults

  temporal:
    profiles: ["core", "mvp", "team", "enterprise", "full-domain-lab"]
    image: temporalio/auto-setup:1.24.2
    container_name: apotheon-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: apotheon
      POSTGRES_PWD: apotheon
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  temporal-ui:
    profiles: ["observability", "mvp", "team", "enterprise", "full-domain-lab"]
    image: temporalio/ui:2.27.2
    container_name: apotheon-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  runtime:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    build:
      context: .
      dockerfile: Dockerfile
    image: apotheon/runtime:local
    container_name: apotheon-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://apotheon:apotheon@postgres:5432/apotheon}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-apotheon-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      <<: *health_defaults

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
