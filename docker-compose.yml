version: "3.9"

name: apotheon

x-health-defaults: &health_defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 10s

services:
  postgres:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: postgres:16.3-alpine
    container_name: apotheon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apotheon
      POSTGRES_USER: apotheon
      POSTGRES_PASSWORD: apotheon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apotheon -d apotheon"]
      <<: *health_defaults

  redis:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: redis:7.2.5-alpine
    container_name: apotheon-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *health_defaults

  qdrant:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: qdrant/qdrant:v1.9.5
    container_name: apotheon-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      <<: *health_defaults

  temporal:
    profiles: ["core", "mvp", "team", "enterprise", "full-domain-lab"]
    image: temporalio/auto-setup:1.24.2
    container_name: apotheon-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: apotheon
      POSTGRES_PWD: apotheon
      BIND_ON_IP: "0.0.0.0"
      TEMPORAL_BROADCAST_ADDRESS: "127.0.0.1"
      TEMPORAL_NAMESPACES: apotheon-dev,oldfarmtrucks-demo
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7233' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  temporal-ui:
    profiles: ["observability", "mvp", "team", "enterprise", "full-domain-lab"]
    image: temporalio/ui:2.27.2
    container_name: apotheon-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  runtime:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    build:
      context: .
      dockerfile: Dockerfile
    image: apotheon/runtime:local
    container_name: apotheon-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://apotheon:apotheon@postgres:5432/apotheon}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-apotheon-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      <<: *health_defaults

  # -------------------------------------------------------------------------
  # Ollama — local LLM inference (qwen3:4b auto-pulled on first start)
  # http://localhost:11434
  # -------------------------------------------------------------------------
  ollama:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: ollama/ollama:latest
    container_name: apotheon-ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "/bin/ollama serve & pid=$! ; sleep 5 ; /bin/ollama pull qwen3:4b ; wait $pid"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # -------------------------------------------------------------------------
  # Streamlit Chat UI — primary operator console
  # http://localhost:8501
  # -------------------------------------------------------------------------
  chat-ui:
    profiles: ["core", "local-solo", "mvp", "team", "enterprise", "full-domain-lab"]
    image: python:3.11-slim
    container_name: apotheon-chat-ui
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command:
      - bash
      - -c
      - "pip install streamlit -q && streamlit run apps/chat-ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"
    ports:
      - "8501:8501"
    environment:
      APOTHEON_API_URL: ${APOTHEON_API_URL:-http://runtime:8000}
      APOTHEON_JWT_TOKEN: ${APOTHEON_JWT_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Streamlit Control Plane Dashboard — workflow runs, HITL queue, metrics
  # http://localhost:8502
  # -------------------------------------------------------------------------
  dashboard:
    profiles: ["observability", "mvp", "team", "enterprise", "full-domain-lab"]
    image: python:3.11-slim
    container_name: apotheon-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command:
      - bash
      - -c
      - "pip install streamlit pyyaml -q && streamlit run apps/dashboard/streamlit_dashboard.py --server.port=8502 --server.address=0.0.0.0 --server.headless=true"
    ports:
      - "8502:8502"
    environment:
      APOTHEON_API_URL: ${APOTHEON_API_URL:-http://runtime:8000}
      APOTHEON_JWT_TOKEN: ${APOTHEON_JWT_TOKEN:-}
      PYTHONPATH: /app

  # -------------------------------------------------------------------------
  # Streamlit Ecommerce Dashboard — OldFarmTrucks analytics surface
  # http://localhost:8503
  # -------------------------------------------------------------------------
  ecommerce-dashboard:
    profiles: ["full-domain-lab"]
    image: python:3.11-slim
    container_name: apotheon-ecommerce-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command:
      - bash
      - -c
      - "pip install streamlit pyyaml -q && streamlit run apps/ecommerce-dashboard/streamlit_app.py --server.port=8503 --server.address=0.0.0.0 --server.headless=true"
    ports:
      - "8503:8503"
    environment:
      PYTHONPATH: /app

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
