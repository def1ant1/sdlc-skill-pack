apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: local-api }
  template:
    metadata:
      labels: { app: local-api }
    spec:
      initContainers:
        - name: wait-for-app
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z local-app 8080; do sleep 2; done']
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: local-api
spec:
  selector:
    app: local-api
  ports:
    - port: 80
      targetPort: 80
