apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: local-app }
  template:
    metadata:
      labels: { app: local-app }
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z local-db 5432; do sleep 2; done']
        - name: wait-for-queue
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z local-queue 6379; do sleep 2; done']
      containers:
        - name: app
          image: python:3.12-slim
          command: ["bash", "-lc", "python -m http.server 8080"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
