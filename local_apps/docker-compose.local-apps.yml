version: "3.9"

services:
  local-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME}
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER} -d ${LOCAL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  local-queue:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  local-app:
    image: python:3.12-slim
    command: ["bash", "-lc", "python -m http.server 8080"]
    depends_on:
      local-db:
        condition: service_healthy
      local-queue:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      APP_QUEUE_URL: ${APP_QUEUE_URL}
      APP_API_KEY: ${APP_API_KEY}
      APP_MIGRATION_LEVEL: ${APP_MIGRATION_LEVEL:-current}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_TARGET_VERSION: ${APP_TARGET_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "bash", "-lc", "python - <<'PY'\nimport urllib.request; urllib.request.urlopen('http://localhost:8080', timeout=2)\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5

  local-worker:
    image: python:3.12-slim
    command: ["bash", "-lc", "while true; do sleep 30; done"]
    depends_on:
      local-db:
        condition: service_healthy
      local-queue:
        condition: service_healthy
    environment:
      WORKER_QUEUE_URL: ${WORKER_QUEUE_URL}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}

  local-api:
    image: nginx:1.27
    depends_on:
      local-app:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
